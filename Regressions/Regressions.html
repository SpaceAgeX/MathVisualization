<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regressions</title>
    <link rel="stylesheet" href="../palette.css">
    <style>
        :root {
            --bg-color: #172038;
            --surface-color: rgba(23, 32, 56, 0.84);
            --surface-strong: rgba(37, 58, 94, 0.88);
            --text-color: #eef6f7;
            --muted-text: rgba(164, 221, 219, 0.72);
            --border-color: rgba(115, 190, 211, 0.18);
            --shadow-color: rgba(3, 9, 18, 0.34);
        }

        body.light-mode {
            --bg-color: #f7f0e4;
            --surface-color: rgba(255, 251, 245, 0.88);
            --surface-strong: rgba(246, 238, 224, 0.92);
            --text-color: #2f1e21;
            --muted-text: rgba(77, 43, 50, 0.7);
            --border-color: rgba(122, 72, 65, 0.18);
            --shadow-color: rgba(75, 44, 29, 0.1);
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; }
        body {
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, rgba(115, 190, 211, 0.12), transparent 28%), var(--bg-color);
            color: var(--text-color);
        }
        body.modal-open { overflow: hidden; }
        .page-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            pointer-events: none;
        }
        .header-actions { display: flex; gap: 0.75rem; pointer-events: auto; }
        .back-link, .info-toggle, .theme-toggle, .info-close {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            min-height: 2.8rem;
            padding: 0 1rem;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            text-decoration: none;
            color: inherit;
            box-shadow: 0 14px 32px -24px var(--shadow-color);
            cursor: pointer;
        }
        .workspace {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1rem 2rem;
        }
        .coming-shell {
            width: min(960px, 100%);
            min-height: 70vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            background: var(--surface-color);
            box-shadow: 0 24px 48px -34px var(--shadow-color);
        }
        .coming-copy { text-align: center; }
        .eyebrow {
            margin: 0 0 0.75rem;
            color: var(--muted-text);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }
        h1 {
            margin: 0;
            font-size: clamp(3rem, 10vw, 6rem);
            line-height: 0.95;
        }
        .subtitle {
            margin: 1rem 0 0;
            color: var(--muted-text);
            font-size: 1rem;
        }
        .info-modal[hidden] { display: none; }
        .info-modal { position: fixed; inset: 0; z-index: 30; }
        .info-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(8, 14, 28, 0.58);
            backdrop-filter: blur(10px);
        }
        .info-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(720px, calc(100% - 1.5rem));
            transform: translate(-50%, -50%);
            padding: 1.25rem;
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            background: var(--surface-color);
            box-shadow: 0 24px 64px -30px var(--shadow-color);
        }
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .info-header h2 { margin: 0; font-size: 1.8rem; }
        .info-content p {
            margin: 0;
            color: var(--muted-text);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <a class="back-link" href="../index.html" aria-label="Back to project list">&larr; Back</a>
        <div class="header-actions">
            <button id="info-toggle" class="info-toggle" type="button" aria-label="Open Regressions information">Info</button>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to light mode">Light</button>
        </div>
    </header>

    <main class="workspace">
        <section class="coming-shell">
            <div class="coming-copy">
                <p class="eyebrow">Regressions</p>
                <h1>Comming Soon</h1>
                <p class="subtitle">This page will compare regression models and show how data points turn into fitted curves.</p>
            </div>
        </section>
    </main>

    <div id="info-modal" class="info-modal" hidden>
        <div id="info-backdrop" class="info-backdrop"></div>
        <section class="info-panel" role="dialog" aria-modal="true" aria-labelledby="info-title">
            <div class="info-header">
                <div>
                    <p class="eyebrow">Guide</p>
                    <h2 id="info-title">Regression Notes</h2>
                </div>
                <button id="info-close" class="info-close" type="button" aria-label="Close information panel">Close</button>
            </div>
            <div class="info-content">
                <p>This project will briefly show how regression models fit patterns in data and help estimate trends.</p>
            </div>
        </section>
    </div>

    <script>
        const infoToggle = document.getElementById("info-toggle");
        const infoClose = document.getElementById("info-close");
        const infoModal = document.getElementById("info-modal");
        const infoBackdrop = document.getElementById("info-backdrop");
        const themeToggle = document.getElementById("theme-toggle");

        function syncThemeUi() {
            const isLightMode = document.body.classList.contains("light-mode");
            themeToggle.textContent = isLightMode ? "Dark" : "Light";
            themeToggle.setAttribute("aria-label", isLightMode ? "Switch to dark mode" : "Switch to light mode");
        }

        infoToggle.addEventListener("click", function () {
            infoModal.hidden = false;
            document.body.classList.add("modal-open");
        });

        function closeInfoModal() {
            infoModal.hidden = true;
            document.body.classList.remove("modal-open");
        }

        infoClose.addEventListener("click", closeInfoModal);
        infoBackdrop.addEventListener("click", closeInfoModal);
        themeToggle.addEventListener("click", function () {
            document.body.classList.toggle("light-mode");
            syncThemeUi();
        });

        window.addEventListener("keydown", function (event) {
            if (event.key === "Escape" && !infoModal.hidden) {
                closeInfoModal();
            }
        });

        syncThemeUi();
    </script>
</body>
</html>
